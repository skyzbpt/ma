<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康諮詢表</title>
<style>
  :root{
    --primary:#0f7a6f;        /* teal */
    --primary-dark:#0a5a52;
    --primary-soft:#e3f2ef;
    --accent:#d98324;         /* warm accent */
    --flag:#fff5e6;           /* flagged row bg */
    --flag-border:#e8b06a;
    --ink:#22312f;
    --muted:#6b7c79;
    --line:#d9e2e0;
    --bg:#f3f6f5;
    --card:#ffffff;
    --danger:#c0392b;
    --radius:14px;
    --shadow:0 1px 3px rgba(16,40,38,.08),0 6px 20px rgba(16,40,38,.06);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei","Segoe UI",Roboto,sans-serif;
    line-height:1.5;font-size:15px;
  }

  /* ---------- toolbar ---------- */
  .toolbar{
    position:sticky;top:0;z-index:50;
    background:rgba(255,255,255,.92);backdrop-filter:saturate(1.4) blur(8px);
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:10px 16px;
  }
  .toolbar .brand{font-weight:700;color:var(--primary-dark);font-size:16px;margin-right:auto;display:flex;align-items:center;gap:8px}
  .toolbar .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--primary)}
  .counter{font-size:13px;color:var(--muted);background:var(--primary-soft);padding:5px 11px;border-radius:999px;font-weight:600;color:var(--primary-dark)}
  .counter b{color:var(--danger)}
  .btn{
    border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:8px 14px;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600;
    transition:.15s;white-space:nowrap;
  }
  .btn:hover{border-color:var(--primary);color:var(--primary-dark)}
  .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn.primary:hover{background:var(--primary-dark);color:#fff}
  .btn.ghost{background:transparent}
  .save-state{font-size:12px;color:var(--muted);min-width:62px;text-align:center}

  /* ---------- layout ---------- */
  .wrap{max-width:1180px;margin:0 auto;padding:22px 16px 120px}
  .title-block{text-align:center;margin:14px 0 26px}
  .title-block h1{font-size:30px;margin:0 0 6px;letter-spacing:6px;color:var(--primary-dark)}
  .title-block p{margin:0;color:var(--muted);font-size:13px;letter-spacing:1px}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden;
  }
  .card > .head{
    display:flex;align-items:center;gap:10px;
    background:linear-gradient(180deg,var(--primary),var(--primary-dark));
    color:#fff;padding:12px 18px;font-weight:700;font-size:17px;letter-spacing:2px;
  }
  .card > .head .num{
    background:rgba(255,255,255,.22);width:26px;height:26px;border-radius:8px;
    display:inline-flex;align-items:center;justify-content:center;font-size:13px;
  }
  .card > .head .hint{margin-left:auto;font-weight:400;font-size:12px;opacity:.9;letter-spacing:0}
  .card > .body{padding:16px 18px}

  /* ---------- basic info grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px 14px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field > label{font-size:12.5px;color:var(--muted);font-weight:600}
  .field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea,
  table input[type=text],table input[type=number],table select{
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;
    font-family:inherit;color:var(--ink);background:#fff;width:100%;
  }
  .field textarea{resize:vertical;min-height:54px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .col-2{grid-column:span 2}.col-3{grid-column:span 3}.col-4{grid-column:span 4}
  .col-5{grid-column:span 5}.col-6{grid-column:span 6}.col-8{grid-column:span 8}
  .col-9{grid-column:span 9}.col-12{grid-column:span 12}
  .inline-units{display:flex;align-items:center;gap:6px}
  .inline-units .unit{color:var(--muted);font-size:13px;white-space:nowrap}
  .subhead{grid-column:span 12;font-weight:700;color:var(--primary-dark);font-size:13.5px;
    border-left:4px solid var(--primary);padding-left:9px;margin-top:6px}
  .chk-row{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center}
  .chk{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;font-size:14px}
  .chk input{width:17px;height:17px;accent-color:var(--primary);cursor:pointer;margin:0}
  .radio-group{display:flex;gap:14px}
  .bmi-pill{font-size:13px;font-weight:700;padding:6px 12px;border-radius:8px;background:var(--primary-soft);color:var(--primary-dark);align-self:flex-end}

  /* ---------- symptom tables ---------- */
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.sym{border-collapse:collapse;width:100%;min-width:760px;font-size:13.5px}
  table.sym th,table.sym td{border:1px solid var(--line);padding:6px 8px;text-align:center;vertical-align:middle}
  table.sym thead th{background:#eef3f2;color:var(--primary-dark);font-weight:700;font-size:12.5px;position:sticky;top:0}
  table.sym td.item{text-align:left;font-weight:600;white-space:nowrap;background:#fafcfb;min-width:150px}
  table.sym td.c-has,table.sym td.c-had{width:46px}
  table.sym td.c-deg{width:78px}
  table.sym td.c-freq{width:120px}
  table.sym td.c-dur{width:100px}
  table.sym td.c-note{min-width:120px}
  table.sym td.c-imp{min-width:140px}
  table.sym input[type=text],table.sym input[type=number]{padding:6px 7px;font-size:13px}
  table.sym select{padding:6px 6px;font-size:13px}
  table.sym input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);cursor:pointer;margin:0}
  table.sym input[type=checkbox].had{accent-color:var(--accent)}
  table.sym tr.flagged td{background:var(--flag)}
  table.sym tr.flagged td.item{background:#ffeccb;box-shadow:inset 4px 0 0 var(--flag-border)}
  .scale-cell{display:flex;align-items:center;justify-content:center;gap:6px}
  .scale-cell input{width:64px}
  .scale-cell .u{font-size:12px;color:var(--muted)}

  /* health check */
  .hc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 14px}
  .hc-field{display:flex;flex-direction:column;gap:5px}
  .hc-field label{font-size:12.5px;color:var(--muted);font-weight:600}
  .hc-field .med{font-size:11px;color:var(--accent);font-weight:700}

  /* ---------- summary ---------- */
  #summaryCard .head{background:linear-gradient(180deg,#15463f,#0a2f2a)}
  .summary-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .sum-box{font-size:14.5px}
  .sum-box .meta{display:flex;flex-wrap:wrap;gap:8px 22px;padding:12px 14px;background:var(--primary-soft);
    border-radius:10px;margin-bottom:16px}
  .sum-box .meta span{font-size:13.5px}
  .sum-box .meta b{color:var(--primary-dark)}
  .sum-sec{margin-bottom:16px}
  .sum-sec h3{font-size:15px;margin:0 0 8px;color:var(--primary-dark);
    border-bottom:2px solid var(--primary-soft);padding-bottom:5px;display:flex;align-items:center;gap:8px}
  .sum-sec h3 .n{background:var(--primary);color:#fff;font-size:12px;border-radius:999px;padding:1px 9px}
  .sysline{margin:5px 0;padding-left:4px}
  .sysline .sys{font-weight:700;color:var(--ink)}
  .sysline .items{color:var(--muted)}
  .tag{display:inline-block;background:#fff;border:1px solid var(--flag-border);color:#9a5b14;
    border-radius:6px;padding:1px 8px;margin:2px 4px 2px 0;font-size:13px}
  .tag.sev{background:#fdecea;border-color:#e6a9a1;color:var(--danger)}
  .tag.hist{background:#eef3f2;border-color:var(--line);color:var(--muted)}
  .priority{background:var(--flag);border:1px dashed var(--flag-border);border-radius:10px;padding:12px 14px}
  .priority ol{margin:6px 0 0;padding-left:22px}
  .priority li{margin:3px 0}
  .empty-note{color:var(--muted);font-style:italic;padding:8px 0}
  .key-metrics{display:flex;flex-wrap:wrap;gap:8px}
  .metric{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 12px;min-width:96px;text-align:center}
  .metric .k{font-size:11.5px;color:var(--muted);display:block}
  .metric .v{font-size:17px;font-weight:700;color:var(--primary-dark)}
  .metric.warn .v{color:var(--danger)}
  .disclaimer{margin-top:18px;font-size:12px;color:var(--muted);background:#fafafa;border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;line-height:1.6}

  .footer{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}

  /* floating jump */
  .fab{position:fixed;right:18px;bottom:18px;z-index:40;background:var(--accent);color:#fff;border:none;
    padding:13px 18px;border-radius:999px;font-weight:700;font-size:14px;cursor:pointer;
    box-shadow:0 6px 20px rgba(217,131,36,.45)}
  .fab:hover{filter:brightness(1.05)}

  @media (max-width:860px){
    .grid{grid-template-columns:repeat(6,1fr)}
    .col-3,.col-4,.col-5,.col-6,.col-8,.col-9{grid-column:span 6}
    .col-2{grid-column:span 3}
    .hc-grid{grid-template-columns:repeat(2,1fr)}
  }

  /* ---------- print ---------- */
  @media print{
    :root{--shadow:none}
    body{background:#fff;font-size:12px}
    .toolbar,.fab,.summary-actions,.no-print{display:none !important}
    .wrap{max-width:none;padding:0}
    .card{break-inside:avoid;box-shadow:none;border:1px solid #bbb;margin-bottom:12px}
    .card > .head{background:#0a5a52 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    table.sym{min-width:0;font-size:10.5px}
    table.sym tr.flagged td,table.sym tr.flagged td.item,
    .sum-box .meta,#summaryCard .head,.priority,table.sym thead th{
      -webkit-print-color-adjust:exact;print-color-adjust:exact}
    .table-scroll{overflow:visible}
    #summaryCard{break-before:page}
    body.print-summary-only .card{display:none}
    body.print-summary-only #summaryCard{display:block;break-before:auto}
    body.print-summary-only .title-block{display:block}
  }
</style>
</head>
<body>

<div class="toolbar no-print">
  <div class="brand"><span class="dot"></span>健康諮詢表 · 顧問 sky</div>
  <span class="counter" id="counter">目前檢出問題：<b>0</b> 項</span>
  <span class="save-state" id="saveState">已自動儲存</span>
  <button class="btn primary" onclick="goSummary()">查看問題總結</button>
  <button class="btn" onclick="window.print()">列印整份</button>
  <button class="btn ghost" onclick="printSummaryOnly()">只印總結</button>
  <button class="btn ghost" onclick="clearForm()">清除重填</button>
</div>

<div class="wrap">
  <div class="title-block">
    <h1>健 康 諮 詢 表</h1>
    <p>HEALTH CONSULTATION FORM</p>
  </div>

  <!-- ============ 基本資料 ============ -->
  <section class="card">
    <div class="head"><span class="num">基</span>基本資料</div>
    <div class="body">
      <div class="grid">
        <div class="field col-3"><label>健康顧問</label><input type="text" id="f_advisor" value="sky"></div>
        <div class="field col-3"><label>日期</label><input type="date" id="f_date"></div>
        <div class="field col-3"><label>初診 / 複診</label>
          <select id="f_visit"><option value="初診">初診</option><option value="複診">複診</option></select>
        </div>
        <div class="field col-3"><label>次數（第幾次）</label><input type="number" id="f_visit_n" min="1" placeholder="1"></div>

        <div class="field col-3"><label>姓名</label><input type="text" id="f_name"></div>
        <div class="field col-3"><label>性別</label>
          <div class="radio-group" style="padding-top:6px">
            <label class="chk"><input type="radio" name="sex" value="男" id="f_sex_m">男</label>
            <label class="chk"><input type="radio" name="sex" value="女" id="f_sex_f">女</label>
          </div>
        </div>
        <div class="field col-3"><label>生日</label><input type="date" id="f_birth"></div>
        <div class="field col-3"><label>年齡（歲）</label><input type="number" id="f_age" min="0" placeholder="自動計算 / 可手填"></div>

        <div class="field col-4"><label>職業</label><input type="text" id="f_job"></div>
        <div class="field col-8"><label>目前問題主述</label><textarea id="f_complaint" placeholder="顧客本次最想解決的問題…"></textarea></div>

        <div class="subhead">過去重大病史及家族病史</div>
        <div class="field col-6">
          <div class="chk-row" style="padding-top:4px">
            <label class="chk"><input type="checkbox" id="h_bp">血壓</label>
            <label class="chk"><input type="checkbox" id="h_sugar">血糖</label>
            <label class="chk"><input type="checkbox" id="h_lipid">血脂</label>
          </div>
        </div>
        <div class="field col-6"><label>其他病史 / 家族史</label><input type="text" id="h_other"></div>

        <div class="subhead">相關診斷及用藥情況</div>
        <div class="field col-4">
          <div class="chk-row" style="padding-top:4px">
            <label class="chk"><input type="checkbox" id="d_stress">壓力</label>
            <label class="chk"><input type="checkbox" id="d_cancer">癌症</label>
          </div>
        </div>
        <div class="field col-5"><label>診斷 / 用藥說明</label><input type="text" id="d_med"></div>
        <div class="field col-3"><label>自評健康分數（1–10）</label><input type="number" id="d_score" min="1" max="10" placeholder="1–10"></div>

        <div class="subhead">本次諮詢期待</div>
        <div class="field col-12">
          <div class="chk-row" style="padding-top:4px">
            <label class="chk"><input type="checkbox" id="e_early">早期發現問題</label>
            <label class="chk"><input type="checkbox" id="e_cause">找出身體不適原因</label>
            <label class="chk"><input type="checkbox" id="e_const">了解體質</label>
            <label class="chk"><input type="checkbox" id="e_care">找出適合的保養方式</label>
          </div>
        </div>

        <div class="subhead">體位測量</div>
        <div class="field col-3"><label>身高</label><div class="inline-units"><input type="number" id="m_height" step="0.1" oninput="calcBMI()"><span class="unit">公分</span></div></div>
        <div class="field col-3"><label>體重</label><div class="inline-units"><input type="number" id="m_weight" step="0.1" oninput="calcBMI()"><span class="unit">公斤</span></div></div>
        <div class="field col-3"><label>體脂</label><div class="inline-units"><input type="number" id="m_fat" step="0.1"><span class="unit">%</span></div></div>
        <div class="field col-3"><label>內臟脂肪</label><div class="inline-units"><input type="number" id="m_visceral" step="0.1"><span class="unit">%</span></div></div>
        <div class="field col-12"><span class="bmi-pill" id="bmiPill">BMI：—</span></div>
      </div>
    </div>
  </section>

  <!-- ============ 症狀檢查表（動態產生） ============ -->
  <div id="sections"></div>

  <!-- ============ 結合基因相關建議 ============ -->
  <section class="card">
    <div class="head"><span class="num">基</span>結合基因相關建議</div>
    <div class="body">
      <div class="grid">
        <div class="subhead">希望以何種方式促進健康</div>
        <div class="field col-7">
          <div class="chk-row" style="padding-top:4px">
            <label class="chk"><input type="checkbox" id="g_life">改變生活型態</label>
            <label class="chk"><input type="checkbox" id="g_diet">改變飲食習慣</label>
            <label class="chk"><input type="checkbox" id="g_supp">使用營養補充品</label>
          </div>
        </div>
        <div class="subhead">主要問題（按優先順序）</div>
        <div class="field col-4"><label>1.</label><input type="text" id="g_p1"></div>
        <div class="field col-4"><label>2.</label><input type="text" id="g_p2"></div>
        <div class="field col-4"><label>3.</label><input type="text" id="g_p3"></div>
      </div>
    </div>
  </section>

  <!-- ============ 健康檢查 ============ -->
  <section class="card">
    <div class="head"><span class="num">檢</span>健康檢查（健檢數據）<span class="hint">有用藥者請於說明欄註記</span></div>
    <div class="body"><div class="hc-grid" id="hcGrid"></div></div>
  </section>

  <!-- ============ 問題總結 ============ -->
  <section class="card" id="summaryCard">
    <div class="head"><span class="num">總</span>問題總結（給顧客）<span class="hint" id="sumStamp"></span></div>
    <div class="body">
      <div class="summary-actions no-print">
        <button class="btn primary" onclick="buildSummary()">↻ 更新總結</button>
        <button class="btn" onclick="copySummary()">複製總結文字</button>
        <button class="btn ghost" onclick="printSummaryOnly()">列印此總結</button>
      </div>
      <div class="sum-box" id="summaryBox"></div>
    </div>
  </section>

  <div class="footer">健康諮詢表 · 本表由健康顧問填寫，作為健康促進諮詢之參考，非醫療診斷。</div>
</div>

<button class="fab no-print" onclick="goSummary()">問題總結 ▾</button>

<script>
/* ============================================================
   資料定義：完全對應原始 Numbers 檔之各分區與項目
   item 可為字串(一般症狀) 或 {name, type:'scale'|'hours'}
   ============================================================ */
const SECTIONS = [
  { id:'diet', label:'飲食作息', items:[
    '常吃（紅）肉','素食飲食','想吃油炸類','想（常）吃甜食／零食','常喝茶／咖啡／飲料／牛奶／優格',
    '外食比例','吃宵夜','不吃早餐','少喝水','少吃菜／水果','用餐時間不定','用餐速度快',
    '嗜酒／抽煙','運動習慣','久坐／久站'
  ]},
  { id:'gi', label:'消化道', items:[
    '消化不良','脹氣','打嗝','胃酸多','胃酸逆流','常胃痛','食慾不振','便秘','腹瀉','排氣味道重',
    '愛吃麵／飯','不吃碳水','用制酸劑','食物過敏','無營養補充習慣','使用補充品'
  ]},
  { id:'inflam', label:'發炎缺氧', items:[
    '工作易疲勞／累','容易嗜睡','睡不飽','注意力分心','忘東忘西','常打哈欠','嚴重打呼','熬夜加班',
    '慢性疼痛','常嘴破','使用成藥','長期用藥（慢性病）','近期抗生素','嘗試減重','腰圍超標','肩頸痠痛','疫苗／確診'
  ]},
  { id:'ans', label:'自律神經', items:[
    {name:'睡眠時間',type:'hours'},'淺眠','失眠（長期）','半夜起床','多夢',
    {name:'壓力指數',type:'scale'},{name:'活力指數',type:'scale'},
    '易生氣','易緊張','易擔心','自我要求高','無法放鬆','情緒低落','感到孤單','負面思考',
    '心悸','胸悶','手腳多（盜）汗','耳鳴','頻尿','靜心冥想'
  ]},
  { id:'hle', label:'心、肝、眼', items:[
    '爬樓梯易喘','頭暈','偏頭痛','手腳冰冷','手腳麻','水腫','氣色不好','傷口不易好','曾中風','心臟支架',
    '眼—乾澀','眼—疲勞','眼—老花','眼—畏光','眼—手術'
  ]},
  { id:'immune', label:'免疫、內分泌、毒素累積', items:[
    '甲狀腺亢進','甲狀腺低下','體重變化','常感冒','感冒不易好','不太感冒','氣喘','落髮','過敏','起床鼻塞',
    '濕疹','蕁麻疹','皰疹','異位性皮膚炎','其他','常接觸空污','長痘痘不易改善','使用塑膠餐盒','補牙／牙周病'
  ]},
  { id:'repro', label:'生殖、肌肉、骨骼', items:[
    '經前症候群','經痛','經期延遲','子宮肌瘤','常化妝','反覆感染','內膜異位','多囊性','以更年期中','懷孕',
    '備孕哺乳','攝護腺肥大','骨折','骨鬆','關節炎','下背痛','腰痠','椎間盤','常抽筋'
  ]}
];

const HEALTH_CHECK = [
  {id:'hc_time',label:'健檢時間',type:'date'},
  {id:'hc_freq',label:'頻率'},
  {id:'hc_chol',label:'總膽固醇',med:true},
  {id:'hc_tg',label:'三酸甘油脂'},
  {id:'hc_ldl',label:'低密度脂蛋白 LDL'},
  {id:'hc_hdl',label:'高密度脂蛋白 HDL'},
  {id:'hc_sbp',label:'收縮壓',med:true},
  {id:'hc_dbp',label:'舒張壓',med:true},
  {id:'hc_glu',label:'空腹血糖',med:true},
  {id:'hc_a1c',label:'糖化血色素 HbA1c',med:true},
  {id:'hc_liver',label:'肝指數'},
  {id:'hc_hep',label:'肝炎'},
  {id:'hc_anemia',label:'貧血'},
  {id:'hc_gfr',label:'腎絲球過濾率 GFR'},
  {id:'hc_stone',label:'腎結石'},
  {id:'hc_crp',label:'發炎指數 CRP'},
  {id:'hc_lkd',label:'肝臟／腎臟疾病'}
];

const COLS = ['項目','有','曾有','程度','次數（次/週·月）','持續時間','備註','透過什麼改善（藥）'];
const STORAGE_KEY = 'health_consult_form_v1';
let ROWS = []; // metadata for every symptom row, for summary building

/* ---------- render symptom sections ---------- */
function renderSections(){
  const host = document.getElementById('sections');
  let html = '';
  SECTIONS.forEach(sec=>{
    html += `<section class="card"><div class="head"><span class="num">症</span>${sec.label}</div>`;
    html += `<div class="body"><div class="table-scroll"><table class="sym"><thead><tr>`;
    COLS.forEach((c,i)=> html += `<th${i===0?' style="text-align:left"':''}>${c}</th>`);
    html += `</tr></thead><tbody>`;
    sec.items.forEach((it,idx)=>{
      const isObj = typeof it === 'object';
      const name = isObj ? it.name : it;
      const type = isObj ? it.type : 'symptom';
      const base = `${sec.id}_${idx}`;
      ROWS.push({base,section:sec.label,name,type});
      if(type==='symptom'){
        html += `<tr id="row_${base}">
          <td class="item">${name}</td>
          <td class="c-has"><input type="checkbox" id="${base}_has" onchange="onFlag('${base}')"></td>
          <td class="c-had"><input type="checkbox" class="had" id="${base}_had" onchange="recalc()"></td>
          <td class="c-deg"><select id="${base}_deg"><option value=""></option><option>輕</option><option>中</option><option>重</option></select></td>
          <td class="c-freq"><input type="text" id="${base}_freq" placeholder="如 3次/週"></td>
          <td class="c-dur"><input type="text" id="${base}_dur" placeholder="如 2年"></td>
          <td class="c-note"><input type="text" id="${base}_note"></td>
          <td class="c-imp"><input type="text" id="${base}_imp"></td>
        </tr>`;
      } else {
        const unit = type==='hours' ? '小時' : '／10';
        const ph = type==='hours' ? '時數' : '1–10';
        html += `<tr id="row_${base}">
          <td class="item">${name}</td>
          <td colspan="2"><div class="scale-cell"><input type="number" id="${base}_val" min="0" ${type==='scale'?'max="10"':''} step="${type==='hours'?'0.5':'1'}" placeholder="${ph}" onchange="recalc()"><span class="u">${unit}</span></div></td>
          <td class="c-deg">—</td>
          <td class="c-freq">—</td>
          <td class="c-dur">—</td>
          <td class="c-note"><input type="text" id="${base}_note"></td>
          <td class="c-imp"><input type="text" id="${base}_imp"></td>
        </tr>`;
      }
    });
    html += `</tbody></table></div></div></section>`;
    host.insertAdjacentHTML('beforeend', html);
    html='';
  });
}

function renderHealthCheck(){
  const host = document.getElementById('hcGrid');
  HEALTH_CHECK.forEach(f=>{
    const med = f.med ? ' <span class="med">(有用藥)</span>' : '';
    const input = f.type==='date'
      ? `<input type="date" id="${f.id}">`
      : `<input type="text" id="${f.id}">`;
    host.insertAdjacentHTML('beforeend',
      `<div class="hc-field"><label>${f.label}${med}</label>${input}</div>`);
  });
}

/* ---------- interactions ---------- */
function onFlag(base){
  const has = document.getElementById(base+'_has').checked;
  document.getElementById('row_'+base).classList.toggle('flagged', has);
  recalc();
}

function calcBMI(){
  const h = parseFloat(document.getElementById('m_height').value);
  const w = parseFloat(document.getElementById('m_weight').value);
  const pill = document.getElementById('bmiPill');
  if(h>0 && w>0){
    const bmi = w/Math.pow(h/100,2);
    let cat='', col='';
    if(bmi<18.5){cat='過輕';col='#2980b9';}
    else if(bmi<24){cat='正常';col='var(--primary-dark)';}
    else if(bmi<27){cat='過重';col='var(--accent)';}
    else {cat='肥胖';col='var(--danger)';}
    pill.innerHTML = `BMI：<b style="color:${col}">${bmi.toFixed(1)}</b>（${cat}）`;
    return bmi.toFixed(1);
  } else { pill.textContent='BMI：—'; return null; }
}

function calcAge(){
  const b = document.getElementById('f_birth').value;
  const ageEl = document.getElementById('f_age');
  if(b && !ageEl.dataset.manual){
    const d = new Date(b), now = new Date();
    let a = now.getFullYear()-d.getFullYear();
    const m = now.getMonth()-d.getMonth();
    if(m<0 || (m===0 && now.getDate()<d.getDate())) a--;
    if(a>=0 && a<150) ageEl.value = a;
  }
}

/* ---------- live counter ---------- */
function recalc(){
  let n=0;
  ROWS.forEach(r=>{
    if(r.type==='symptom'){
      const el=document.getElementById(r.base+'_has');
      if(el && el.checked) n++;
    }
  });
  const c=document.getElementById('counter');
  c.innerHTML = `目前檢出問題：<b>${n}</b> 項`;
  buildSummary();      // keep summary live
  scheduleSave();
}

/* ============================================================
   問題總結
   ============================================================ */
function v(id){const e=document.getElementById(id);return e?(e.value||'').trim():'';}
function ck(id){const e=document.getElementById(id);return e?e.checked:false;}

function collect(){
  const data={
    advisor:v('f_advisor'), date:v('f_date'), visit:v('f_visit'), visitN:v('f_visit_n'),
    name:v('f_name'), sex:(ck('f_sex_m')?'男':ck('f_sex_f')?'女':''),
    age:v('f_age'), job:v('f_job'), complaint:v('f_complaint'),
    history:[['血壓','h_bp'],['血糖','h_sugar'],['血脂','h_lipid']].filter(x=>ck(x[1])).map(x=>x[0]),
    historyOther:v('h_other'),
    dx:[['壓力','d_stress'],['癌症','d_cancer']].filter(x=>ck(x[1])).map(x=>x[0]),
    med:v('d_med'), score:v('d_score'),
    expect:[['早期發現問題','e_early'],['找出身體不適原因','e_cause'],['了解體質','e_const'],['找出適合的保養方式','e_care']].filter(x=>ck(x[1])).map(x=>x[0]),
    height:v('m_height'), weight:v('m_weight'), fat:v('m_fat'), visceral:v('m_visceral'), bmi:calcBMI(),
    improve:[['改變生活型態','g_life'],['改變飲食習慣','g_diet'],['使用營養補充品','g_supp']].filter(x=>ck(x[1])).map(x=>x[0]),
    priorities:[v('g_p1'),v('g_p2'),v('g_p3')].filter(Boolean),
    bySection:{}, history_sym:[], scales:{}
  };
  SECTIONS.forEach(s=>data.bySection[s.label]=[]);
  ROWS.forEach(r=>{
    if(r.type==='symptom'){
      if(ck(r.base+'_has')){
        const deg=v(r.base+'_deg'), freq=v(r.base+'_freq'), dur=v(r.base+'_dur'), note=v(r.base+'_note');
        let label=r.name;
        const extras=[];
        if(deg) extras.push(deg);
        if(freq) extras.push(freq);
        if(dur) extras.push(dur);
        if(note) extras.push(note);
        data.bySection[r.section].push({name:r.name, deg, text: label + (extras.length?`（${extras.join('、')}）`:'')});
      }
      if(ck(r.base+'_had')) data.history_sym.push({section:r.section,name:r.name});
    } else {
      const val=v(r.base+'_val');
      if(val!=='') data.scales[r.name]={val, type:r.type};
    }
  });
  return data;
}

function buildSummary(){
  const d=collect();
  const box=document.getElementById('summaryBox');
  document.getElementById('sumStamp').textContent = d.date ? d.date : '';

  // meta line
  const metaParts=[];
  if(d.name) metaParts.push(`<span><b>姓名</b>　${esc(d.name)}</span>`);
  if(d.sex) metaParts.push(`<span><b>性別</b>　${d.sex}</span>`);
  if(d.age) metaParts.push(`<span><b>年齡</b>　${esc(d.age)} 歲</span>`);
  if(d.job) metaParts.push(`<span><b>職業</b>　${esc(d.job)}</span>`);
  if(d.visit) metaParts.push(`<span><b>診次</b>　${d.visit}${d.visitN?' 第'+esc(d.visitN)+'次':''}</span>`);
  metaParts.push(`<span><b>顧問</b>　${esc(d.advisor||'sky')}</span>`);

  // total flagged
  let total=0; Object.values(d.bySection).forEach(a=>total+=a.length);

  let html = `<div class="meta">${metaParts.join('')}</div>`;

  // complaint
  if(d.complaint){
    html += sumSec('主訴', `<div>${esc(d.complaint)}</div>`);
  }

  // key metrics
  const metrics=[];
  if(d.bmi) metrics.push(metric('BMI', d.bmi, d.bmi>=27||d.bmi<18.5));
  if(d.fat) metrics.push(metric('體脂', d.fat+'%'));
  if(d.visceral) metrics.push(metric('內臟脂肪', d.visceral+'%'));
  if(d.score) metrics.push(metric('自評健康', d.score+'/10', Number(d.score)<=4));
  if(d.scales['壓力指數']) metrics.push(metric('壓力指數', d.scales['壓力指數'].val+'/10', Number(d.scales['壓力指數'].val)>=7));
  if(d.scales['活力指數']) metrics.push(metric('活力指數', d.scales['活力指數'].val+'/10', Number(d.scales['活力指數'].val)<=4));
  if(d.scales['睡眠時間']) metrics.push(metric('睡眠', d.scales['睡眠時間'].val+' 小時', Number(d.scales['睡眠時間'].val)<6));
  if(metrics.length) html += sumSec('關鍵指標', `<div class="key-metrics">${metrics.join('')}</div>`);

  // history
  const histBits=[];
  if(d.history.length) histBits.push('重大/家族病史：'+d.history.join('、'));
  if(d.historyOther) histBits.push('其他：'+esc(d.historyOther));
  if(d.dx.length) histBits.push('相關診斷：'+d.dx.join('、'));
  if(d.med) histBits.push('用藥：'+esc(d.med));
  if(histBits.length) html += sumSec('病史 / 診斷 / 用藥', histBits.map(b=>`<div class="sysline">${b}</div>`).join(''));

  // ----- detected problems by system -----
  let sysHtml='';
  const ranking=[];
  SECTIONS.forEach(s=>{
    const arr=d.bySection[s.label];
    if(arr.length){
      ranking.push({label:s.label, n:arr.length});
      const tags=arr.map(it=>`<span class="tag${it.deg==='重'?' sev':''}">${esc(it.text)}</span>`).join('');
      sysHtml += `<div class="sysline"><span class="sys">${s.label}</span> <span class="items">（${arr.length}）</span><div>${tags}</div></div>`;
    }
  });
  if(total){
    html += `<div class="sum-sec"><h3>各系統檢出問題 <span class="n">${total} 項</span></h3>${sysHtml}</div>`;
  } else {
    html += `<div class="sum-sec"><h3>各系統檢出問題</h3><div class="empty-note">尚未勾選任何「有」的項目。</div></div>`;
  }

  // history symptoms (曾經有過)
  if(d.history_sym.length){
    const tags=d.history_sym.map(h=>`<span class="tag hist">${esc(h.name)}<span style="opacity:.6">·${h.section.replace(/、.*/,'')}</span></span>`).join('');
    html += sumSec('曾經有過（既往）', `<div>${tags}</div>`);
  }

  // priority
  ranking.sort((a,b)=>b.n-a.n);
  if(ranking.length){
    const top=ranking.slice(0,3);
    html += `<div class="sum-sec"><h3>建議優先關注</h3><div class="priority">
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px">依各系統檢出項目數排序（檢出愈多，建議愈優先深入了解）：</div>
      <ol>${top.map(t=>`<li><b>${t.label}</b>　${t.n} 項</li>`).join('')}</ol></div></div>`;
  }
  // consultant-set priorities
  if(d.priorities.length){
    html += sumSec('顧問評估之主要問題（優先順序）',
      `<ol style="margin:0;padding-left:22px">${d.priorities.map(p=>`<li>${esc(p)}</li>`).join('')}</ol>`);
  }

  // improvement preference & expectation
  const wantBits=[];
  if(d.improve.length) wantBits.push('促進健康方式：'+d.improve.join('、'));
  if(d.expect.length) wantBits.push('諮詢期待：'+d.expect.join('、'));
  if(wantBits.length) html += sumSec('改善方向 / 諮詢期待', wantBits.map(b=>`<div class="sysline">${b}</div>`).join(''));

  // health check entered values
  const hcVals=HEALTH_CHECK.map(f=>({label:f.label,val:v(f.id)})).filter(x=>x.val);
  if(hcVals.length){
    html += sumSec('健康檢查數據', `<div>${hcVals.map(x=>`<span class="tag hist">${esc(x.label)}：${esc(x.val)}</span>`).join('')}</div>`);
  }

  html += `<div class="disclaimer">※ 本總結依顧問與顧客於諮詢時所填寫之主觀感受與資料彙整而成，僅作為健康促進與生活型態調整之參考，<b>不構成任何醫療診斷或治療建議</b>。如有身體不適或數據異常，請尋求專業醫療協助。</div>`;

  box.innerHTML = html;
}

function sumSec(title, inner){ return `<div class="sum-sec"><h3>${title}</h3>${inner}</div>`; }
function metric(k,val,warn){ return `<div class="metric${warn?' warn':''}"><span class="k">${k}</span><span class="v">${esc(String(val))}</span></div>`; }
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- plain-text summary for copy ---------- */
function summaryText(){
  const d=collect();
  const L=[];
  L.push('【健康諮詢 · 問題總結】');
  const head=[];
  if(d.name)head.push('姓名 '+d.name);
  if(d.sex)head.push(d.sex);
  if(d.age)head.push(d.age+'歲');
  if(d.date)head.push(d.date);
  L.push(head.join('  '));
  if(d.complaint)L.push('〔主訴〕'+d.complaint);
  const km=[];
  if(d.bmi)km.push('BMI '+d.bmi);
  if(d.fat)km.push('體脂 '+d.fat+'%');
  if(d.visceral)km.push('內臟脂肪 '+d.visceral+'%');
  if(d.score)km.push('自評健康 '+d.score+'/10');
  if(d.scales['壓力指數'])km.push('壓力 '+d.scales['壓力指數'].val+'/10');
  if(d.scales['活力指數'])km.push('活力 '+d.scales['活力指數'].val+'/10');
  if(d.scales['睡眠時間'])km.push('睡眠 '+d.scales['睡眠時間'].val+'小時');
  if(km.length)L.push('〔關鍵指標〕'+km.join('、'));
  if(d.history.length||d.historyOther||d.dx.length||d.med){
    const h=[...d.history]; if(d.historyOther)h.push(d.historyOther);
    if(d.dx.length)h.push('診斷:'+d.dx.join('/')); if(d.med)h.push('用藥:'+d.med);
    L.push('〔病史/用藥〕'+h.join('、'));
  }
  L.push('〔各系統檢出問題〕');
  let any=false;
  SECTIONS.forEach(s=>{const arr=d.bySection[s.label];if(arr.length){any=true;L.push('・'+s.label+'（'+arr.length+'）：'+arr.map(x=>x.text).join('、'));}});
  if(!any)L.push('（無）');
  const rank=SECTIONS.map(s=>({l:s.label,n:d.bySection[s.label].length})).filter(x=>x.n).sort((a,b)=>b.n-a.n).slice(0,3);
  if(rank.length)L.push('〔建議優先關注〕'+rank.map(r=>r.l+'('+r.n+')').join('、'));
  if(d.priorities.length)L.push('〔主要問題〕'+d.priorities.map((p,i)=>(i+1)+'.'+p).join('  '));
  if(d.improve.length)L.push('〔促進健康方式〕'+d.improve.join('、'));
  if(d.expect.length)L.push('〔諮詢期待〕'+d.expect.join('、'));
  L.push('— 健康顧問 '+(d.advisor||'sky')+'（本總結為健康促進參考，非醫療診斷）');
  return L.join('\n');
}
function copySummary(){
  const t=summaryText();
  navigator.clipboard?.writeText(t).then(
    ()=>toast('已複製總結文字'),
    ()=>fallbackCopy(t)
  );
}
function fallbackCopy(t){
  const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('已複製總結文字');}catch(e){alert(t);}
  document.body.removeChild(ta);
}
function toast(msg){
  const el=document.getElementById('saveState');const old=el.textContent;
  el.textContent=msg;setTimeout(()=>el.textContent=old,1500);
}

/* ---------- navigation / print ---------- */
function goSummary(){document.getElementById('summaryCard').scrollIntoView({behavior:'smooth'});}
function printSummaryOnly(){
  buildSummary();
  document.body.classList.add('print-summary-only');
  window.print();
  setTimeout(()=>document.body.classList.remove('print-summary-only'),300);
}

/* ---------- persistence ---------- */
let saveTimer=null;
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveForm,400);
  document.getElementById('saveState').textContent='儲存中…';}
function allInputs(){return document.querySelectorAll('input,select,textarea');}
function saveForm(){
  const state={};
  allInputs().forEach(el=>{
    if(!el.id)return;
    state[el.id]= (el.type==='checkbox'||el.type==='radio') ? el.checked : el.value;
  });
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
    document.getElementById('saveState').textContent='已自動儲存';}catch(e){}
}
function loadForm(){
  let state;try{state=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');}catch(e){state={};}
  allInputs().forEach(el=>{
    if(!el.id||!(el.id in state))return;
    if(el.type==='checkbox'||el.type==='radio') el.checked=state[el.id];
    else el.value=state[el.id];
  });
  // restore flagged rows
  ROWS.forEach(r=>{if(r.type==='symptom'){const h=document.getElementById(r.base+'_has');
    if(h&&h.checked)document.getElementById('row_'+r.base).classList.add('flagged');}});
}
function clearForm(){
  if(!confirm('確定要清除整份表單、開始新顧客嗎？此動作無法復原。'))return;
  localStorage.removeItem(STORAGE_KEY);
  allInputs().forEach(el=>{
    if(el.type==='checkbox'||el.type==='radio')el.checked=false; else el.value='';
  });
  document.getElementById('f_advisor').value='sky';
  document.querySelectorAll('tr.flagged').forEach(tr=>tr.classList.remove('flagged'));
  calcBMI();recalc();
}

/* ---------- init ---------- */
renderSections();
renderHealthCheck();
loadForm();
// default date = today if empty
if(!document.getElementById('f_date').value){
  document.getElementById('f_date').value=new Date().toISOString().slice(0,10);
}
document.getElementById('f_birth').addEventListener('change',()=>{calcAge();recalc();});
document.getElementById('f_age').addEventListener('input',function(){this.dataset.manual='1';});
// global listeners: any change/input updates save + summary
document.addEventListener('input',scheduleSave);
document.addEventListener('change',()=>{recalc();});
calcBMI();
recalc();
</script>
